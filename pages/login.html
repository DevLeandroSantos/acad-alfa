<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Acad Alfa</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="pagina-login">

    <!-- Cabeçalho -->
    <header class="cabecalho">
        <div class="container cabecalho-conteudo">
            <h1 class="logo"><a href="index.html">ACAD <span>ALFA</span></a></h1>
            <nav class="menu">
                <ul>
                    <li><a href="index.html">Voltar ao site</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Caixa de Login -->
    <main class="login-container">
        <div class="login-card">
            <h2>Entrar na sua conta</h2>
            <p class="login-subtitulo">Acesse sua área de aluno</p>

            <form class="login-form">
                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com">
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
                </div>

                <button type="button" class="botao-principal botao-largo">Entrar</button>

                <p class="login-rodape">
                    Não tem conta? <a href="#">Cadastre-se</a>
                </p>
            </form>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="rodape">
        <div class="container">
            <p>&copy; 2026 Acad Alfa - Todos os direitos </p>
            <p class="creditos">Desenvolvido por: <strong>Leandro Santos</strong> e <strong>Kauã Borges</strong></p>
        </div>
    </footer>

</body>
</html>
